<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>חיפוש עברית - e-vrit</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    padding: 10px;
    direction: rtl;
  }
  h1 {
    font-size: 17px;
    text-align: center;
    color: #aaa;
    font-weight: normal;
    margin-bottom: 8px;
  }
  #search-box {
    width: 100%;
    font-size: 28px;
    padding: 12px 14px;
    border: 2px solid #444;
    border-radius: 8px;
    background: #222;
    color: #fff;
    direction: rtl;
    text-align: right;
    margin-bottom: 8px;
    outline: none;
  }
  .action-row {
    display: flex;
    gap: 7px;
    margin-bottom: 10px;
  }
  #btn-search {
    flex: 1;
    padding: 14px;
    background: #1a6fdb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
  }
  #btn-clear {
    padding: 14px 16px;
    background: #444;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  #btn-backspace {
    padding: 14px 16px;
    background: #6a2020;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .kb-section {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 7px;
    justify-content: center;
  }
  .key {
    background: #2e2e2e;
    color: #fff;
    border: 1px solid #4a4a4a;
    border-radius: 7px;
    font-size: 22px;
    padding: 13px 6px;
    min-width: 44px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    line-height: 1;
  }
  .key:active { background: #4a4a4a; }
  .key.final {
    background: #1e2e1e;
    color: #88cc88;
    border-color: #3a6a3a;
  }
  .key.space {
    flex: 1 1 80px;
    font-size: 13px;
    color: #aaa;
  }
  #msg {
    text-align: center;
    font-size: 13px;
    color: #f88;
    min-height: 18px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<h1>🔍 חיפוש ב-e-vrit</h1>

<input type="text" id="search-box" placeholder="הקלד שם ספר או מחבר..." readonly>

<div class="action-row">
  <button id="btn-search" onclick="doSearch()">חפש ב-e-vrit ◀</button>
  <button id="btn-backspace" onclick="doBackspace()">⌫</button>
  <button id="btn-clear" onclick="doClear()">נקה</button>
</div>

<div id="msg"></div>

<div class="kb-section" id="kb-letters"></div>
<div class="kb-section" id="kb-finals"></div>

<script>
var SEARCH_URL = 'https://reads.e-vrit.co.il/search?q=';

var letters = 'אבגדהוזחטיכלמנסעפצקרשת'.split('');
var finals  = 'ךםןףץ'.split('');

function buildKb(containerId, chars, extraClass) {
  var c = document.getElementById(containerId);
  chars.forEach(function(ch) {
    var b = document.createElement('button');
    b.className = 'key' + (extraClass ? ' ' + extraClass : '');
    b.textContent = ch;
    b.addEventListener('mousedown', function(e) { e.preventDefault(); });
    b.addEventListener('click', function() { addChar(ch); });
    c.appendChild(b);
  });
  if (containerId === 'kb-finals') {
    var sp = document.createElement('button');
    sp.className = 'key space';
    sp.textContent = 'רווח';
    sp.addEventListener('mousedown', function(e) { e.preventDefault(); });
    sp.addEventListener('click', function() { addChar(' '); });
    c.appendChild(sp);
  }
}

buildKb('kb-letters', letters, '');
buildKb('kb-finals', finals, 'final');

function addChar(ch) {
  document.getElementById('search-box').value += ch;
  document.getElementById('msg').textContent = '';
}

function doBackspace() {
  var box = document.getElementById('search-box');
  box.value = box.value.slice(0, -1);
}

function doClear() {
  document.getElementById('search-box').value = '';
  document.getElementById('msg').textContent = '';
}

function doSearch() {
  var q = document.getElementById('search-box').value.trim();
  if (!q) {
    document.getElementById('msg').textContent = 'נא להקליד מילת חיפוש תחילה';
    return;
  }
  window.location.href = SEARCH_URL + encodeURIComponent(q);
}
</script>
</body>
</html>
